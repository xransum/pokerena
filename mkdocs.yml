site_name: pokerena
site_description: Pokemon battle tournament simulator -- runs millions of battles to rank every Pokemon by tier and compare against Smogon placements.
site_url: https://pokerena.readthedocs.io
repo_url: https://github.com/xransum/pokerena
repo_name: xransum/pokerena

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - CLI Reference: cli.md
  - API Reference:
    - Models: api/models.md
    - Data:
      - Cache: api/cache.md
      - Loader: api/loader.md
      - PokeAPI client: api/pokeapi.md
      - Smogon tiers: api/smogon.md
    - Engine:
      - Battle: api/battle.md
      - Stats: api/stats.md
      - Type chart: api/types.md
    - Tournament:
      - Runner: api/runner.md
    - Report:
      - Console: api/console.md
      - Writers: api/writers.md

markdown_extensions:
  - mkdocs-click
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
